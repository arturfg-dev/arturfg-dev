<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>Artur Guimarães — data platform engineer</title>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1A1714"/>

  <!-- Left column nodes (opacity = data flow intensity) -->
  <circle cx="168" cy="152" r="52" fill="#EBC9B7"/>
  <circle cx="168" cy="256" r="52" fill="#EBC9B7" opacity="0.55"/>
  <circle cx="168" cy="360" r="52" fill="#EBC9B7" opacity="0.22"/>

  <!-- Cross-connecting lines (stop at node edges, r=52) -->
  <!-- top-left → mid-right -->
  <line x1="220" y1="152" x2="292" y2="256" stroke="#EBC9B7" stroke-width="14" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- mid-left → top-right -->
  <line x1="220" y1="256" x2="292" y2="152" stroke="#EBC9B7" stroke-width="14" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- mid-left → bottom-right -->
  <line x1="220" y1="256" x2="292" y2="360" stroke="#EBC9B7" stroke-width="14" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- bottom-left → mid-right -->
  <line x1="220" y1="360" x2="292" y2="256" stroke="#EBC9B7" stroke-width="14" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Right column nodes -->
  <circle cx="344" cy="152" r="52" fill="#EBC9B7" opacity="0.22"/>
  <circle cx="344" cy="256" r="52" fill="#EBC9B7" opacity="0.65"/>
  <circle cx="344" cy="360" r="52" fill="#EBC9B7"/>
</svg>